<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<style>
:root{--pri:#3370FF;--pri-d:#2456d6;--bg:#f4f6fb;--side:#1b2333;--side2:#28324a;--ink:#1f2733;--muted:#8792a3;--line:#e6eaf2;
 --todo:#8a94a6;--doing:#f5a623;--review:#fb8c00;--done:#28c76f;--blocked:#ea5455;}
*{box-sizing:border-box;font-family:'Sarabun','Segoe UI',system-ui,sans-serif}
body{margin:0;background:var(--bg);color:var(--ink)}
.hide{display:none!important}
/* LOGIN */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#3370FF,#5b8cff 60%,#8ab0ff)}
.login .box{background:#fff;border-radius:20px;padding:34px 30px;width:360px;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.login .logo{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,var(--pri),#5b8cff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:26px;margin:0 auto 10px}
.login h1{text-align:center;font-size:20px;margin:0 0 2px}.login p{text-align:center;color:var(--muted);margin:0 0 20px;font-size:13px}
.login input{width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:15px;margin-bottom:12px;font-family:inherit}
.login button{width:100%;padding:12px;background:var(--pri);color:#fff;border:0;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer}
.login .err{color:#ea5455;font-size:13px;text-align:center;min-height:18px;margin-top:8px}
/* APP */
.layout{display:flex;min-height:100vh}
.side{width:230px;background:var(--side);color:#cfd8e6;flex-shrink:0;display:flex;flex-direction:column;padding:14px 10px}
.brand{display:flex;align-items:center;gap:10px;padding:8px 10px 16px;font-weight:800;color:#fff;font-size:17px}
.brand .logo{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--pri),#5b8cff);display:flex;align-items:center;justify-content:center}
.nav{display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;color:#cfd8e6;text-decoration:none;font-size:14.5px;cursor:pointer}
.nav a .ic{width:20px;text-align:center}.nav a:hover{background:var(--side2)}.nav a.on{background:var(--pri);color:#fff}
.nav .sep{font-size:11px;color:#5b6577;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.nav .foot{margin-top:auto}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 22px;gap:14px}
.top h2{font-size:17px;margin:0;flex:1}
.chip{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:0}
.chip.in{background:#e7f7ee;color:#1a9e58}.chip.out{background:#eef2fb;color:var(--pri)}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;cursor:pointer}
.avatar img{width:100%;height:100%;object-fit:cover}
.content{padding:22px;overflow:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}
.card .n{font-size:27px;font-weight:800;color:var(--pri-d)}.card .l{font-size:12.5px;color:var(--muted);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 360px;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}.side{width:62px}.brand span,.nav a span.t,.nav .sep{display:none}}
.box{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.box h3{font-size:14px;margin:0 0 12px}
.kan{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.col{background:#f7f9fd;border:1px solid var(--line);border-radius:12px;padding:8px;min-height:100px}
.col h4{font-size:12px;margin:2px 4px 8px;text-align:center;color:#fff;padding:5px;border-radius:7px}
.kc{background:#fff;border:1px solid var(--line);border-left:4px solid var(--pri);border-radius:9px;padding:8px 10px;margin:6px 0;font-size:13px;cursor:grab;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.kc .m{font-size:11px;color:var(--muted);margin-top:4px}.col.drag{outline:2px dashed var(--pri);outline-offset:-4px}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line)}th{background:#f2f5fb;color:#556;font-size:12px}
.btn{background:var(--pri);color:#fff;border:0;padding:9px 16px;border-radius:9px;font-weight:700;cursor:pointer;font-size:13.5px}
.btn.g{background:#28c76f}.btn.r{background:#ea5455}.btn.ghost{background:#eef2fb;color:var(--pri)}
input,select,textarea{width:100%;padding:9px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin:4px 0 10px;font-family:inherit}
label{font-size:12.5px;color:#556;font-weight:600}
.li{padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}.li small{color:var(--muted)}
.badge{padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;color:#fff}
.pin{background:#fff8e1;border:1px solid #f3e2a8;border-radius:10px;padding:12px;margin-bottom:10px}
.loading{padding:60px;text-align:center;color:var(--muted)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:74px;padding:5px;font-size:11px}
.cell.today{border-color:var(--pri);box-shadow:0 0 0 1px var(--pri)}
.cell .d{font-weight:700;color:#889}.cell .t{background:#eaf1ff;color:var(--pri-d);border-radius:5px;padding:1px 4px;margin-top:3px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.modal{position:fixed;inset:0;background:rgba(20,28,40,.55);display:flex;align-items:center;justify-content:center;z-index:50}
.modal .m{background:#fff;border-radius:16px;padding:22px;width:380px;max-width:92vw}
.bigav{width:96px;height:96px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;margin:0 auto 8px;overflow:hidden}
.bigav img{width:100%;height:100%;object-fit:cover}
.hello{font-size:22px;font-weight:800;margin:0 0 2px}.subtle{color:var(--muted);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login hide">
  <div class="box">
    <div class="logo">M</div>
    <h1>Mersi Workspace</h1><p>เข้าสู่ระบบด้วยบัญชีของทีม</p>
    <input id="lu" placeholder="Username" autocomplete="username">
    <input id="lp" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="err" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="layout hide">
  <div class="side">
    <div class="brand"><div class="logo">M</div><span>Mersi Work</span></div>
    <div class="nav" id="nav"></div>
  </div>
  <div class="main">
    <div class="top">
      <h2 id="pageTitle">Home</h2>
      <button class="chip out" id="attnBtn" onclick="toggleAttn()">🕐</button>
      <div class="avatar" id="topAv" onclick="openProfile()">?</div>
    </div>
    <div class="content" id="content"><div class="loading">…</div></div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal hide">
  <div class="m">
    <div class="bigav" id="bigav">?</div>
    <div style="text-align:center;margin-bottom:12px"><button class="btn ghost" onclick="pickAvatar()">📷 เปลี่ยนรูป</button></div>
    <label>ชื่อที่แสดง</label><input id="pfName">
    <button class="btn" style="width:100%" onclick="saveName()">บันทึกชื่อ</button>
    <hr style="border:none;border-top:1px solid var(--line);margin:16px 0">
    <label>เปลี่ยนรหัสผ่าน</label>
    <input id="pfOld" type="password" placeholder="รหัสผ่านเดิม">
    <input id="pfNew" type="password" placeholder="รหัสผ่านใหม่">
    <button class="btn" style="width:100%" onclick="savePw()">เปลี่ยนรหัสผ่าน</button>
    <p id="pfMsg" style="text-align:center;font-weight:700;min-height:18px"></p>
    <div style="display:flex;gap:8px;margin-top:6px"><button class="btn ghost" style="flex:1" onclick="closeProfile()">ปิด</button><button class="btn r" style="flex:1" onclick="doLogout()">ออกจากระบบ</button></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
var TOKEN=localStorage.getItem('mersi_token')||'', ME=null, DASH=null, TEAM=null, CUR='home', ATTN=null;
var COLS=[['📋 TODO','todo','#8a94a6'],['🔄 DOING','doing','#f5a623'],['👀 REVIEW','review','#fb8c00'],['✅ DONE','done','#28c76f'],['⛔ BLOCKED','blocked','#ea5455']];
var MAPU={todo:'📋 TODO',doing:'🔄 DOING',review:'👀 REVIEW',done:'✅ DONE',blocked:'⛔ BLOCKED'};
function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function run(fn){var a=[].slice.call(arguments,1);return new Promise(function(res,rej){var r=google.script.run.withSuccessHandler(res).withFailureHandler(rej);r[fn].apply(r,a);})}
function el(id){return document.getElementById(id)}
function avatarHTML(u,cls){return (u&&u.avatar&&u.avatar.indexOf('data:')===0)?'<img src="'+u.avatar+'">':esc((u&&u.name||'?').slice(0,1))}

/* ---------- AUTH ---------- */
window.onload=function(){ if(TOKEN){ run('ws_me',TOKEN).then(function(r){ if(r.ok){ME=r.user;startApp()} else {showLogin()} }).catch(showLogin);} else showLogin(); };
function showLogin(){el('app').classList.add('hide');el('login').classList.remove('hide');}
function doLogin(){el('lerr').textContent='';var u=el('lu').value,p=el('lp').value;
  run('ws_login',u,p).then(function(r){ if(r.ok){TOKEN=r.token;localStorage.setItem('mersi_token',TOKEN);ME=r.user;el('login').classList.add('hide');startApp();} else {el('lerr').textContent=r.err||'ล็อกอินไม่สำเร็จ';} }).catch(function(e){el('lerr').textContent=e.message});}
function doLogout(){run('ws_logout',TOKEN);localStorage.removeItem('mersi_token');TOKEN='';ME=null;location.reload();}

function startApp(){ el('app').classList.remove('hide'); el('topAv').innerHTML=avatarHTML(ME); buildNav(); loadDash(); }
function buildNav(){
  var items=[['home','🏠','Home'],['tasks','✅','งาน/Kanban'],['daily','📝','ส่ง Daily'],['cal','📅','ปฏิทิน']];
  if(ME.isBoss) items=items.concat([['team','👥','ทีม'],['assign','➕','มอบหมาย'],['feed','📢','ประกาศ'],['approve','✋','อนุมัติ']]);
  else items=items.concat([['approve','✋','ขออนุมัติ'],['feed','📢','ประกาศ']]);
  el('nav').innerHTML=items.map(function(x){return '<a data-v="'+x[0]+'" onclick="go(\''+x[0]+'\')"><span class="ic">'+x[1]+'</span><span class="t">'+x[2]+'</span></a>'}).join('')+
    '<div class="foot"><a onclick="openProfile()"><span class="ic">⚙️</span><span class="t">โปรไฟล์</span></a></div>';
}
function setActive(){[].forEach.call(document.querySelectorAll('.nav a[data-v]'),function(a){a.classList.toggle('on',a.getAttribute('data-v')===CUR)})}
var TITLES={home:'Home',tasks:'งาน / Kanban',daily:'ส่ง Daily Report',cal:'ปฏิทินของฉัน',team:'ทีมทั้งหมด',assign:'มอบหมายงาน',feed:'ประกาศทีม',approve:'ขออนุมัติ'};

/* ---------- DATA ---------- */
function loadDash(){el('content').innerHTML='<div class="loading">กำลังโหลด…</div>';
  run('ws_dash',TOKEN).then(function(d){ if(!d.ok){showLogin();return} DASH=d;ATTN=d.attnToday;paintAttn(); go('home'); });}
function go(v){CUR=v;setActive();el('pageTitle').textContent=TITLES[v]||v;ROUTE[v]();}
var ROUTE={
  home:function(){renderHome()}, tasks:function(){renderKanban(DASH.assignments,true)}, daily:function(){renderDaily()},
  cal:function(){renderCal(DASH.calendar)},
  team:function(){renderTeam()}, assign:function(){renderAssign()}, feed:function(){renderFeed()}, approve:function(){renderApprove()}
};

/* ---------- HOME ---------- */
function renderHome(){
  var s=DASH.stats,u=ME;
  var html='<div class="box" style="margin-bottom:16px;display:flex;align-items:center;gap:16px">'+
    '<div class="bigav" style="width:64px;height:64px;font-size:26px;margin:0">'+avatarHTML(u)+'</div>'+
    '<div><div class="hello">สวัสดี, '+esc(u.name)+' 👋</div><div class="subtle">'+esc(u.role==="supervisor"?"หัวหน้าทีม":u.dept)+(u.tid?' · '+esc(u.tid):'')+'</div></div></div>';
  html+='<div class="cards">'+card(s.score,'คะแนนเดือนนี้')+card(s.updateDays,'วันลง Daily')+card(s.doneDaily,'✅ Done')+card(s.openTasks,'งานค้าง')+card(s.doneTasks,'งานเสร็จ')+'</div>';
  html+='<div class="grid2"><div class="box"><h3>📅 ปฏิทินเดือนนี้</h3>'+miniCal(DASH.calendar)+'</div>'+
    '<div class="box"><h3>📢 ประกาศ</h3>'+(DASH.feed.length?DASH.feed.slice(0,4).map(function(f){return '<div class="li"><b>'+esc(f.title)+'</b><br><small>'+esc(f.author)+' · '+esc(f.time)+'</small></div>'}).join(''):'<p style="color:#889">ยังไม่มี</p>')+'</div></div>';
  html+='<div class="box" style="margin-top:16px"><h3>🗂️ งานของฉัน</h3>'+(DASH.assignments.length?kanbanRO(DASH.assignments):'<p style="color:#889">ยังไม่มีงานมอบหมาย</p>')+'</div>';
  el('content').innerHTML=html;
}
function card(n,l){return '<div class="card"><div class="n">'+esc(n)+'</div><div class="l">'+esc(l)+'</div></div>'}

/* ---------- KANBAN ---------- */
function stKey(st){st=''+st;if(st.indexOf('DOING')>-1)return'doing';if(st.indexOf('REVIEW')>-1)return'review';if(st.indexOf('DONE')>-1)return'done';if(st.indexOf('BLOCK')>-1)return'blocked';return'todo'}
function renderKanban(asg,editable){
  var html='<div class="kan">'+COLS.map(function(c){
    var cs=asg.filter(function(a){return stKey(a.status)===c[1]}).map(function(a){
      return '<div class="kc" draggable="'+(editable?'true':'false')+'" data-id="'+esc(a.id)+'" ondragstart="dStart(event)">'+esc(a.title)+
      '<div class="m">'+(ME.isBoss&&a.assignee?'👤 '+esc(a.assignee)+' · ':'')+'⏰ '+esc(a.due||'-')+'</div></div>'}).join('');
    return '<div class="col" data-k="'+c[1]+'" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event)"><h4 style="background:'+c[2]+'">'+c[0]+'</h4>'+cs+'</div>'}).join('')+'</div>';
  el('content').innerHTML=html+'<p style="color:#889;font-size:12px">ลากการ์ดข้ามคอลัมน์เพื่อเปลี่ยนสถานะ</p>';
}
function kanbanRO(asg){return '<div class="kan">'+COLS.slice(0,4).map(function(c){
  var cs=asg.filter(function(a){return stKey(a.status)===c[1]}).map(function(a){return '<div class="kc">'+esc(a.title)+'<div class="m">⏰ '+esc(a.due||'-')+'</div></div>'}).join('');
  return '<div class="col"><h4 style="background:'+c[2]+'">'+c[0]+'</h4>'+cs+'</div>'}).join('')+'</div>';}
var DRAG=null;
function dStart(e){DRAG=e.target.getAttribute('data-id');e.dataTransfer.effectAllowed='move'}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag')}
function dLeave(e){e.currentTarget.classList.remove('drag')}
function dDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag');var k=e.currentTarget.getAttribute('data-k');
  var list=ME.isBoss&&CUR==='tasks'?DASH.allAssignments:DASH.assignments; list.forEach(function(a){if(a.id===DRAG)a.status=MAPU[k]});
  renderKanban(list,true);run('ws_setTaskStatus',TOKEN,DRAG,MAPU[k]);}

/* ---------- DAILY ---------- */
function renderDaily(){
  var html='<div class="grid2"><div class="box"><h3>📝 ส่ง Daily Update วันนี้</h3>'+
    '<label>✅ Done (บรรทัดละงาน)</label><textarea id="dDone" rows="4"></textarea>'+
    '<label>🔄 Doing</label><textarea id="dDoing" rows="3"></textarea>'+
    '<label>🚧 Blocker</label><textarea id="dBlk" rows="2"></textarea>'+
    '<button class="btn" onclick="sendDaily()">ส่งเข้า Sheet</button> <span id="dMsg" style="color:#28c76f;font-weight:700"></span></div>'+
    '<div class="box"><h3>ประวัติล่าสุด</h3>'+(DASH.daily.length?DASH.daily.slice(-14).reverse().map(function(x){return '<div class="li"><small>'+esc(x.date)+' · '+esc(x.cat)+'</small><br>'+esc(x.item)+'</div>'}).join(''):'<p style="color:#889">ยังไม่มี</p>')+'</div></div>';
  el('content').innerHTML=html;
}
function lines(id){return el(id).value.split('\n').map(function(s){return s.trim()}).filter(Boolean)}
function sendDaily(){el('dMsg').textContent='กำลังส่ง…';run('ws_submitDaily',TOKEN,{done:lines('dDone'),doing:lines('dDoing'),blocker:lines('dBlk')}).then(function(r){
  el('dMsg').textContent='✅ ส่งแล้ว '+r.rows+' รายการ';el('dDone').value='';el('dDoing').value='';el('dBlk').value='';run('ws_dash',TOKEN).then(function(d){DASH=d});});}

/* ---------- CALENDAR ---------- */
function miniCal(events){return calGrid(events,true)}
function renderCal(events){el('content').innerHTML='<div class="box">'+calGrid(events,false)+'<p style="color:#889;font-size:12px;margin-top:8px">แสดง Deadline งานที่มอบหมาย (มอบงานแล้วเข้า Google Calendar อัตโนมัติ)</p></div>'}
function calGrid(events,mini){
  var now=new Date(),y=now.getFullYear(),m=now.getMonth(),td=now.getDate();
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  var by={};(events||[]).forEach(function(e){if(e.due){var p=e.due.split('/');if(+p[1]===m+1)(by[+p[0]]=by[+p[0]]||[]).push(e)}});
  var html='<div style="font-weight:700;margin-bottom:8px">'+['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][m]+' '+(y+543)+'</div><div class="cal">';
  ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(function(d){html+='<div style="text-align:center;font-size:11px;color:#889;font-weight:700">'+d+'</div>'});
  for(var i=0;i<first;i++)html+='<div></div>';
  for(var d=1;d<=days;d++){var evs=(by[d]||[]);var dots=mini?(evs.length?'<span class="t">'+evs.length+' งาน</span>':''):evs.map(function(e){return '<span class="t" title="'+esc(e.title)+'">'+(ME.isBoss&&e.who?esc(e.who)+': ':'')+esc(e.title)+'</span>'}).join('');
    html+='<div class="cell'+(d===td?' today':'')+'"><div class="d">'+d+'</div>'+dots+'</div>';}
  return html+'</div>';
}

/* ---------- TEAM (boss) ---------- */
function renderTeam(){
  var html='<div class="box"><h3>🏆 Leaderboard <small style="color:#889;font-weight:400">— คลิกชื่อดูรายคน</small></h3><table><tr><th>#</th><th>ชื่อ</th><th>แผนก</th><th>คะแนน</th><th>ลง Daily</th><th>✅Done</th><th>งานเสร็จ</th><th>ค้าง</th></tr>'+
    DASH.team.map(function(p,i){return '<tr style="cursor:pointer" onclick="openMember(\''+p.nick+'\')"><td>'+(i<3?['🥇','🥈','🥉'][i]:i+1)+'</td><td><b style="color:var(--pri)">'+esc(p.nick)+' →</b></td><td>'+esc(p.dept)+'</td><td><b>'+p.stats.score+'</b></td><td>'+p.stats.updateDays+'</td><td>'+p.stats.doneDaily+'</td><td>'+p.stats.doneTasks+'</td><td>'+p.stats.openTasks+'</td></tr>'}).join('')+'</table></div>';
  html+='<div class="box" style="margin-top:16px"><h3>คะแนนรายคน</h3><canvas id="chart" height="90"></canvas></div>';
  html+='<div class="box" style="margin-top:16px"><h3>🗂️ งานทั้งทีม</h3>'+kanbanRO(DASH.allAssignments)+'</div>';
  el('content').innerHTML=html;
  new Chart(el('chart'),{type:'bar',data:{labels:DASH.team.map(function(p){return p.nick}),datasets:[{label:'คะแนน',data:DASH.team.map(function(p){return p.stats.score}),backgroundColor:'#3370FF'}]},options:{plugins:{legend:{display:false}}}});
}
function openMember(nick){el('content').innerHTML='<div class="loading">…</div>';run('ws_memberData',TOKEN,nick).then(function(d){
  var s=d.stats;var html='<button class="btn ghost" onclick="go(\'team\')">← กลับทีม</button><h2 style="margin:12px 0">👤 '+esc(nick)+'</h2>'+
    '<div class="cards">'+card(s.score,'คะแนน')+card(s.updateDays,'วันลง Daily')+card(s.doneDaily,'✅Done')+card(s.openTasks,'งานค้าง')+card(s.doneTasks,'งานเสร็จ')+'</div>'+
    '<div class="box" style="margin-bottom:14px"><h3>🗂️ งาน</h3>'+(d.assignments.length?kanbanRO(d.assignments):'<p style="color:#889">ไม่มีงาน</p>')+'</div>'+
    '<div class="box"><h3>📅 Daily ล่าสุด</h3>'+(d.daily.length?d.daily.slice(-12).reverse().map(function(x){return '<div class="li"><small>'+esc(x.date)+' · '+esc(x.cat)+'</small><br>'+esc(x.item)+'</div>'}).join(''):'<p style="color:#889">ไม่มี</p>')+'</div>';
  el('content').innerHTML=html;});}

/* ---------- ASSIGN (boss) ---------- */
function renderAssign(){
  var opts=DASH.team.map(function(p){return '<option>'+esc(p.nick)+'</option>'}).join('');
  el('content').innerHTML='<div class="box" style="max-width:520px"><h3>➕ มอบหมายงานใหม่</h3>'+
    '<label>งาน</label><input id="aTitle">'+
    '<label>มอบหมายให้</label><select id="aWho">'+opts+'</select>'+
    '<label>Priority</label><select id="aPri"><option>🔴 HIGH</option><option selected>🟡 MEDIUM</option><option>🟢 LOW</option></select>'+
    '<div class="grid2" style="grid-template-columns:1fr 1fr"><div><label>วันเริ่ม</label><input type="date" id="aStart"></div><div><label>Deadline</label><input type="date" id="aDue"></div></div>'+
    '<label>หมายเหตุ</label><textarea id="aNote" rows="2"></textarea>'+
    '<button class="btn" onclick="submitAssign()">มอบหมาย + ใส่ Google Calendar</button> <span id="aMsg" style="color:#28c76f;font-weight:700"></span></div>';
}
function submitAssign(){var d={title:el('aTitle').value,assignee:el('aWho').value,priority:el('aPri').value,start:el('aStart').value,due:el('aDue').value,note:el('aNote').value};
  if(!d.title){alert('ใส่ชื่องาน');return}el('aMsg').textContent='กำลังบันทึก…';
  run('ws_createAssignment',TOKEN,d).then(function(r){el('aMsg').textContent='✅ '+r.id;el('aTitle').value='';run('ws_dash',TOKEN).then(function(x){DASH=x});});}

/* ---------- FEED ---------- */
function renderFeed(){
  var html='';
  if(ME.isBoss)html+='<div class="box" style="margin-bottom:14px"><h3>➕ โพสต์ประกาศ</h3><label>หัวข้อ</label><input id="fT"><label>เนื้อหา</label><textarea id="fB" rows="3"></textarea><label><input type="checkbox" id="fP" style="width:auto"> ปักหมุด</label><br><button class="btn" onclick="postFeed()">โพสต์</button></div>';
  html+='<div class="box"><h3>📢 ประกาศทั้งหมด</h3>'+(DASH.feed.length?DASH.feed.map(function(f){return '<div class="'+(f.pinned?'pin':'li')+'">'+(f.pinned?'📌 ':'')+'<b>'+esc(f.title)+'</b><br><small>'+esc(f.author)+' · '+esc(f.time)+'</small><br>'+esc(f.body)+'</div>'}).join(''):'<p style="color:#889">ยังไม่มี</p>')+'</div>';
  el('content').innerHTML=html;
}
function postFeed(){run('ws_feedPost',TOKEN,{title:el('fT').value,body:el('fB').value,pinned:el('fP').checked}).then(function(){run('ws_dash',TOKEN).then(function(d){DASH=d;go('feed')})})}

/* ---------- APPROVALS ---------- */
function renderApprove(){
  var list=ME.isBoss?(DASH.approvals||[]):[];
  var html='<div class="grid2"><div class="box"><h3>✋ ยื่นคำขอ</h3><label>ประเภท</label><select id="apT"><option>ลาพัก</option><option>ลาป่วย</option><option>ขออนุมัติงบ</option><option>อื่นๆ</option></select><label>รายละเอียด</label><textarea id="apD" rows="2"></textarea><div class="grid2" style="grid-template-columns:1fr 1fr"><div><label>ตั้งแต่</label><input type="date" id="apF"></div><div><label>ถึง</label><input type="date" id="apTo"></div></div><button class="btn" onclick="sendApprove()">ส่งคำขอ</button> <span id="apMsg" style="color:#28c76f;font-weight:700"></span></div>';
  html+='<div class="box"><h3>ℹ️ ข้อมูล</h3><p style="color:#889;font-size:13px">คำขอจะส่งให้หัวหน้าอนุมัติ ดูสถานะได้ที่นี่'+(ME.isBoss?' และอนุมัติด้านล่าง':'')+'</p></div></div>';
  if(ME.isBoss)html+='<div class="box" style="margin-top:16px"><h3>👑 รายการอนุมัติ</h3><table><tr><th>ผู้ขอ</th><th>ประเภท</th><th>รายละเอียด</th><th>ช่วง</th><th>สถานะ</th><th></th></tr>'+list.map(function(a){return '<tr><td>'+esc(a.requester)+'</td><td>'+esc(a.type)+'</td><td>'+esc(a.detail)+'</td><td>'+esc(a.from||'')+(a.to?'–'+esc(a.to):'')+'</td><td>'+stBadge(a.status)+'</td><td>'+(a.status==='รออนุมัติ'?'<button class="btn g" onclick="decide(\''+a.id+'\',\'อนุมัติ\')">✓</button> <button class="btn r" onclick="decide(\''+a.id+'\',\'ปฏิเสธ\')">✗</button>':'')+'</td></tr>'}).join('')+'</table></div>';
  el('content').innerHTML=html;
}
function stBadge(s){var c=s==='อนุมัติ'?'#28c76f':(s==='ปฏิเสธ'?'#ea5455':'#f5a623');return '<span class="badge" style="background:'+c+'">'+esc(s)+'</span>'}
function sendApprove(){el('apMsg').textContent='กำลังส่ง…';run('ws_approvalCreate',TOKEN,{type:el('apT').value,detail:el('apD').value,from:el('apF').value,to:el('apTo').value}).then(function(){el('apMsg').textContent='✅ ส่งแล้ว';if(ME.isBoss){run('ws_dash',TOKEN).then(function(d){DASH=d})}});}
function decide(id,d){run('ws_approvalDecide',TOKEN,id,d,'').then(function(){run('ws_dash',TOKEN).then(function(x){DASH=x;go('approve')})})}

/* ---------- ATTENDANCE ---------- */
function paintAttn(){var b=el('attnBtn');if(!b)return;if(!ATTN){b.className='chip out';b.textContent='🕐 เข้างาน'}else if(!ATTN.out){b.className='chip in';b.textContent='✅ เข้า '+ATTN.in+' · เลิกงาน'}else{b.className='chip in';b.textContent='เข้า '+ATTN.in+' ออก '+ATTN.out}}
function toggleAttn(){ if(!ATTN){run('ws_checkIn',TOKEN).then(function(){run('ws_dash',TOKEN).then(function(d){DASH=d;ATTN=d.attnToday;paintAttn()})})} else if(!ATTN.out){run('ws_checkOut',TOKEN).then(function(){run('ws_dash',TOKEN).then(function(d){DASH=d;ATTN=d.attnToday;paintAttn()})})} }

/* ---------- PROFILE ---------- */
function openProfile(){el('bigav').innerHTML=avatarHTML(ME);el('pfName').value=ME.name;el('pfMsg').textContent='';el('profileModal').classList.remove('hide');}
function closeProfile(){el('profileModal').classList.add('hide');}
function saveName(){el('pfMsg').style.color='#28c76f';el('pfMsg').textContent='กำลังบันทึก…';run('ws_updateProfile',TOKEN,{name:el('pfName').value}).then(function(r){if(r.ok){ME=r.user;el('topAv').innerHTML=avatarHTML(ME);el('pfMsg').textContent='✅ บันทึกชื่อแล้ว';}})}
function savePw(){el('pfMsg').style.color='#ea5455';run('ws_changePassword',TOKEN,el('pfOld').value,el('pfNew').value).then(function(r){if(r.ok){el('pfMsg').style.color='#28c76f';el('pfMsg').textContent='✅ เปลี่ยนรหัสแล้ว';el('pfOld').value='';el('pfNew').value='';}else{el('pfMsg').textContent=r.err;}})}
function pickAvatar(){var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=function(){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement('canvas');c.width=c.height=128;var x=c.getContext('2d');var s=Math.min(img.width,img.height);x.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,128,128);var data=c.toDataURL('image/jpeg',0.7);el('pfMsg').style.color='#28c76f';el('pfMsg').textContent='กำลังอัปโหลด…';run('ws_updateProfile',TOKEN,{avatar:data}).then(function(r){if(r.ok){ME=r.user;el('bigav').innerHTML=avatarHTML(ME);el('topAv').innerHTML=avatarHTML(ME);el('pfMsg').textContent='✅ เปลี่ยนรูปแล้ว';}});};img.src=ev.target.result;};rd.readAsDataURL(f);};inp.click();}
</script>
