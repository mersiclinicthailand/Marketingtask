<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2b3327">
<title>Mersi Workspace</title>
<style>
/* ===== Mersi Clinic brand — sage ===== */
:root{--sage:#8A9A7B;--pri:#7d8f6a;--pri-d:#617350;--bg:#f5f7f2;--side:#2b3327;--side2:#3b4634;--ink:#2a3128;--muted:#8b9284;--line:#e6e9e0;
 --todo:#a3a99a;--doing:#d9a441;--review:#c98aa8;--done:#6f9e63;--blocked:#cf6a5e;--card:#ffffff;
 --shadow:0 1px 2px rgba(43,51,39,.04),0 8px 24px rgba(43,51,39,.06);}
*{box-sizing:border-box;font-family:'Sarabun','Segoe UI',system-ui,sans-serif}
body{margin:0;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
.hide{display:none!important}
.serif{font-family:Georgia,'Times New Roman',serif}
/* LOGIN */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 20% 0%,#a8b79a 0%,#8A9A7B 45%,#6b7c5b 100%)}
.login .box{background:#fff;border-radius:24px;padding:38px 32px;width:380px;box-shadow:0 30px 70px rgba(30,40,25,.28)}
.login .logo{width:96px;height:96px;margin:0 auto 14px;display:block}
.login h1{text-align:center;font-size:20px;margin:0 0 2px}.login p{text-align:center;color:var(--muted);margin:0 0 20px;font-size:13px}
.login input{width:100%;padding:12px;border:1px solid var(--line);border-radius:11px;font-size:15px;margin-bottom:12px;font-family:inherit}
.login button{width:100%;padding:12px;background:var(--pri);color:#fff;border:0;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer}
.login .err{color:#e2574f;font-size:13px;text-align:center;min-height:18px;margin-top:8px}
/* APP */
.layout{display:flex;min-height:100vh}
.side{width:238px;background:var(--side);color:#d7ddcf;flex-shrink:0;display:flex;flex-direction:column;padding:16px 12px;position:relative}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 18px;color:#fff}
.brand .logo{width:40px;height:40px;flex-shrink:0}
.brand .bt{display:flex;flex-direction:column;line-height:1.1}
.brand .bt b{font-family:Georgia,serif;font-size:18px;font-weight:400;letter-spacing:.3px}
.brand .bt i{font-style:normal;font-size:9.5px;letter-spacing:2.6px;color:#a9b79a}
.nav{display:flex;flex-direction:column;gap:3px}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;color:#d7ddcf;text-decoration:none;font-size:14.5px;cursor:pointer;transition:background .16s,color .16s,transform .16s}
.nav a .ic{width:20px;text-align:center}.nav a:hover{background:var(--side2);transform:translateX(2px)}
.nav a.on{background:linear-gradient(135deg,var(--sage),#6f8060);color:#fff;box-shadow:0 6px 16px rgba(0,0,0,.22)}
.nav .sep{font-size:11px;color:#5e7a71;padding:12px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.nav .foot{margin-top:auto}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.top{height:64px;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:14px;position:sticky;top:0;z-index:20}
.top h2{font-size:17px;margin:0;flex:1;font-weight:700}
.chip{padding:7px 13px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:0}
.chip.in{background:#e2efdc;color:#4d7343}.chip.out{background:#eef1e9;color:var(--pri-d)}
.bell{position:relative;font-size:20px;cursor:pointer;padding:6px 8px;border-radius:10px;line-height:1;transition:background .15s}
.bell:hover{background:#eef1e9}
.bdot{position:absolute;top:0;right:0;background:#cf6a5e;color:#fff;border-radius:999px;font-size:10px;font-weight:800;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;cursor:pointer}
.avatar img{width:100%;height:100%;object-fit:cover}
.content{padding:22px;overflow:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow);transition:transform .16s,box-shadow .16s}
.card:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(43,51,39,.10)}
.card .n{font-size:26px;font-weight:800;color:var(--pri-d)}.card .l{font-size:12.5px;color:var(--muted);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 380px;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}.box h3{font-size:14px;margin:0 0 12px}
.box h3 small{color:var(--muted);font-weight:400}
/* ===== Trello-like Kanban Board ===== */
.kan{display:grid;grid-template-columns:repeat(6,minmax(272px,1fr));gap:12px;padding:4px 2px 24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
.col{background:#f1efe8;border:0;border-radius:14px;padding:8px 8px 4px;min-height:120px;display:flex;flex-direction:column;max-height:calc(100vh - 200px);scroll-snap-align:start;box-shadow:0 1px 2px rgba(43,51,39,.06)}
.col h4{font-size:13px;margin:6px 8px 10px;text-align:left;color:#fff;padding:6px 10px;border-radius:8px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.col h4::after{content:attr(data-count);opacity:.85;font-size:11px;background:rgba(255,255,255,.25);padding:2px 8px;border-radius:10px}
.col-body{flex:1;overflow-y:auto;padding:2px}
.col-body::-webkit-scrollbar{width:6px}.col-body::-webkit-scrollbar-thumb{background:rgba(43,51,39,.15);border-radius:3px}
/* ===== Trello-like Card ===== */
.kc{background:#fff;border:0;border-radius:10px;padding:0;margin:0 0 8px;font-size:13.5px;cursor:pointer;box-shadow:0 1px 0 rgba(9,30,66,.15);transition:transform .08s,box-shadow .08s;overflow:hidden;position:relative}
.kc:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(9,30,66,.22)}
.kc:active{cursor:grabbing;transform:rotate(2deg)}
.kc.revise{background:#fde5e0!important;box-shadow:0 2px 8px rgba(207,106,94,.25)}
.kc.revise::before{content:'✏️ ต้องแก้ไข';color:#cf6a5e;font-weight:800;font-size:11px;display:block;padding:6px 12px 0;letter-spacing:.3px}
.kc .kcCover{width:100%;height:120px;object-fit:cover;display:block;background:#f4f7ef}
.kc .kcBody{padding:8px 12px 10px}
.kc .kcLabels{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.kc .kcLabel{height:8px;min-width:36px;border-radius:4px;transition:height .1s,min-width .1s}
.kc:hover .kcLabel{height:14px;min-width:48px}
.kc .kcTitle{line-height:1.36;color:var(--ink);word-break:break-word}
.kc .kcFoot{display:flex;align-items:center;gap:10px;margin-top:8px;color:var(--muted);font-size:12px;flex-wrap:wrap}
.kc .kcFoot .fi{display:inline-flex;align-items:center;gap:3px}
.kc .kcAv{width:24px;height:24px;border-radius:50%;background:var(--sage);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;margin-left:-6px}
.kc .m{font-size:11px;color:var(--muted);margin-top:4px}
.col.drag{outline:2px dashed var(--pri);outline-offset:-4px;background:#e8eddf}
/* Trello-style quick-add */
.addcard{margin:2px 4px 4px}
.addbtn{display:block;padding:9px 10px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;text-align:left;transition:background .12s}
.addbtn:hover{background:rgba(9,30,66,.08);color:var(--pri-d)}
.qa{background:#fff;border-radius:10px;padding:8px;box-shadow:0 1px 0 rgba(9,30,66,.15)}
.qaInput{width:100%;border:0;outline:0;resize:none;font-family:inherit;font-size:14px;padding:6px;min-height:56px}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 11px;text-align:left;border-bottom:1px solid var(--line)}th{background:#f0f3ea;color:#5a614f;font-size:12px}
tr:hover td{background:#fafbf7}
.btn{background:linear-gradient(135deg,var(--sage),#6f8060);color:#fff;border:0;padding:10px 17px;border-radius:11px;font-weight:700;cursor:pointer;font-size:13.5px;transition:transform .14s,box-shadow .14s,filter .14s;box-shadow:0 4px 12px rgba(122,139,105,.28)}
.btn:hover{transform:translateY(-1px);filter:brightness(1.05)}.btn:active{transform:translateY(0)}
.btn.g{background:linear-gradient(135deg,#6f9e63,#5b8551)}.btn.r{background:linear-gradient(135deg,#cf6a5e,#b4544a)}
.btn.ghost{background:#eef1e9;color:var(--pri-d);box-shadow:none;border:1px solid var(--line)}
input,select,textarea{width:100%;padding:9px;border:1px solid var(--line);border-radius:9px;font-size:14px;margin:4px 0 10px;font-family:inherit}
label{font-size:12.5px;color:#556;font-weight:600}
.li{padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px}.li small{color:var(--muted)}
.li:last-child{border-bottom:0}
.badge{padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;color:#fff}
.pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
.pill.done{background:#e2efdc;color:#4d7343}.pill.doing{background:#fbf0d6;color:#9b6f1c}
.pill.blocked{background:#f9e0dd;color:#a94a3f}.pill.review{background:#f5e3ed;color:#9c5480}
.pill.need{background:#e3ebf4;color:#446189}.pill.todo{background:#eef0e9;color:#6d7364}
.pin{background:#fff8e1;border:1px solid #f3e2a8;border-radius:10px;padding:12px;margin-bottom:10px}
.loading{padding:60px;text-align:center;color:var(--muted)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cell{background:#fff;border:1px solid var(--line);border-radius:8px;min-height:74px;padding:5px;font-size:11px}
.cell.today{border-color:var(--pri);box-shadow:0 0 0 1px var(--pri)}
.cell .d{font-weight:700;color:#9aa08e}.cell .t{background:#eef2e7;color:var(--pri-d);border-radius:5px;padding:1px 4px;margin-top:3px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell.hasev{cursor:pointer}.cell.hasev:hover{border-color:var(--sage);background:#f4f7ef;box-shadow:0 0 0 1px var(--sage);transform:translateY(-1px)}
.cbadge{display:inline-block;background:#e8eddf;color:var(--pri-d);border-radius:6px;padding:1px 6px;font-size:10.5px;font-weight:700;margin-top:3px}
.cdots{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}.cdot{width:8px;height:8px;border-radius:50%}
.daygrp{margin-bottom:12px}.daygrp .nm{font-weight:700;color:var(--pri-d);margin-bottom:2px}
/* ช่วงเวลา (เริ่ม–สิ้นสุด) */
.trow{display:flex;align-items:center;gap:8px;margin:4px 0 10px}
.trow input{margin:0;flex:1}.tsep{color:var(--muted);font-size:13px;flex-shrink:0}
/* เลือกผู้รับงานหลายคน (ชิปแตะเลือก) */
.duechip{display:inline-block;background:#fdf0d5;color:#8a6d1a;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:700}
.thumbs{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.thumbA{display:inline-block;position:relative;width:60px;height:60px;border-radius:8px;overflow:hidden;background:#f4f7ef;border:1px solid var(--line);transition:transform .12s}
.thumbA:hover{transform:scale(1.05);border-color:var(--sage)}
.thumb{width:60px;height:60px;object-fit:cover;display:block;cursor:zoom-in}
.thumbA .fbico{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:22px;color:var(--pri-d);cursor:pointer}
.thumbA.fb .fbico{display:flex}     /* โชว์ icon 📎 เมื่อ thumbnail โหลดไม่ได้ */
.thumbA.fb{background:#e8eddf;border-style:dashed}
#plWrap .cell{min-height:110px;padding:6px}#plWrap .plcard:hover{background:#e8eddf!important}
.picks{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 8px}
.pick{padding:9px 14px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;user-select:none;transition:all .14s}
.pick:hover{border-color:var(--sage)}
.pick.on{background:linear-gradient(135deg,var(--sage),#6f8060);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(122,139,105,.3)}
.pick.on:before{content:'✓ '}
.modal{position:fixed;inset:0;background:rgba(15,30,26,.55);display:flex;align-items:center;justify-content:center;z-index:50}
.modal .m{background:#fff;border-radius:16px;padding:22px;width:380px;max-width:92vw}
.bigav{width:96px;height:96px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;margin:0 auto 8px;overflow:hidden}
.bigav img{width:100%;height:100%;object-fit:cover}
.hello{font-size:22px;font-weight:800;margin:0 0 2px}.subtle{color:var(--muted);font-size:13px}
.stream .row{display:flex;gap:9px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
.stream .row:last-child{border-bottom:0}
.stream .who{width:66px;flex-shrink:0;font-weight:700;font-size:12.5px;color:var(--ink)}
.stream .it{flex:1;font-size:13px;line-height:1.35}.stream .it small{color:var(--muted)}
/* ===== hamburger + responsive ===== */
.hamb{display:none;background:none;border:0;font-size:22px;cursor:pointer;color:var(--ink);padding:4px 8px;border-radius:8px}
.hamb:hover{background:#eef1e9}
.overlay{display:none;position:fixed;inset:0;background:rgba(15,30,26,.4);z-index:40}
.overlay.show{display:block}
/* ===== TABLET (601–1024) — iPad, Windows tablets ===== */
@media(max-width:1024px) and (min-width:601px){
  .side{width:76px} .brand .bt,.nav a span.t,.nav .sep{display:none}
  .brand{justify-content:center;padding:6px 0 18px} .brand .logo{width:44px;height:44px}
  .nav a{justify-content:center;padding:14px 0} .nav a .ic{width:auto;font-size:22px}
  .content{padding:20px} .cards{grid-template-columns:repeat(3,1fr)}
  .card .n{font-size:28px} .box h3{font-size:15px}
  .grid2{grid-template-columns:1fr!important}
  .kan{grid-template-columns:repeat(3,minmax(240px,1fr));overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity}
  .col{scroll-snap-align:start}
  .kc{padding:11px 12px;font-size:14px}
  .btn{min-height:44px;font-size:14.5px}
  input,select,textarea{font-size:15.5px;padding:11px}
  .cell{min-height:84px;font-size:12px}
  .modal .m{width:min(560px,92vw)}
}
/* ===== MOBILE — ตัวใหญ่ อ่านง่าย นิ้วกดสะดวก ===== */
@media(max-width:600px){
  body{font-size:16px}
  .hamb{display:block;font-size:26px;padding:6px 10px}
  .side{position:fixed;top:0;left:0;bottom:0;width:280px!important;z-index:45;transform:translateX(-100%);transition:transform .24s ease;box-shadow:2px 0 22px rgba(0,0,0,.32);padding:18px 14px}
  .side.open{transform:translateX(0)}
  .brand .bt,.nav a span.t{display:flex!important}
  .brand{justify-content:flex-start} .brand .logo{width:48px;height:48px} .brand .bt b{font-size:21px} .brand .bt i{font-size:10.5px}
  .nav a{padding:15px 14px;font-size:17px;border-radius:14px;gap:14px}
  .nav a .ic{width:26px;font-size:19px;text-align:center}
  .top{padding:0 14px;gap:12px;height:62px} .top h2{font-size:18px}
  .avatar{width:44px;height:44px;font-size:17px}
  .content{padding:14px}
  .grid2{grid-template-columns:1fr!important;gap:14px}
  .cards{grid-template-columns:repeat(2,1fr);gap:12px}
  .card{padding:18px;border-radius:18px} .card .n{font-size:32px} .card .l{font-size:14px;margin-top:5px}
  .box{padding:16px;border-radius:18px} .box h3{font-size:16.5px;margin-bottom:14px} .box h3 small{font-size:13px}
  .hello{font-size:21px} .subtle{font-size:14px}
  label{font-size:14.5px}
  input,select,textarea{font-size:16px;padding:14px;border-radius:12px;margin:6px 0 14px}  /* 16px กัน iOS ซูมเอง */
  textarea{min-height:90px}
  .btn{font-size:16px;padding:14px 20px;border-radius:14px;min-height:50px;width:auto}
  .li{font-size:15.5px;padding:13px 0;line-height:1.45}
  .li small{font-size:13px}
  .pill{font-size:13px;padding:4px 12px}
  .stream .row{padding:12px 0;gap:11px} .stream .who{width:60px;font-size:14px} .stream .it{font-size:15px;line-height:1.45}
  /* ตารางกว้าง → เลื่อนซ้ายขวาได้ในกล่อง */
  .box{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:14px;min-width:460px}th,td{padding:12px 9px}
  /* ✅ Kanban มือถือ = เรียงลงมาทีละคอลัมน์ (ไม่ต้องเลื่อนซ้ายขวา) */
  .kan{grid-template-columns:1fr!important;gap:14px;overflow:visible}
  .col{padding:12px;min-height:auto} .col h4{font-size:14.5px;padding:10px;border-radius:10px}
  .kc{font-size:15px;padding:13px 14px;border-radius:12px} .kc .m{font-size:12.5px;margin-top:6px}
  /* ฟอร์ม: ช่องวันที่/เวลา กดง่าย */
  .trow input{font-size:16px;padding:14px}.trow{gap:10px}
  /* กราฟไม่ล้นกรอบ */
  canvas{max-width:100%!important}
  .cal{gap:5px} .cell{min-height:76px;font-size:12px;padding:7px;border-radius:12px}
  .cell .d{font-size:14px} .cbadge{font-size:12px;padding:3px 8px} .cdot{width:10px;height:10px}
  .daygrp .nm{font-size:16px}
  .modal .m{width:94vw!important;padding:22px;border-radius:20px}
  .modal h2{font-size:20px}
  .login .box{width:92vw;padding:34px 24px} .login h1{font-size:22px} .login p{font-size:14px}
  .login .logo{width:110px;height:110px}
  .login input{font-size:16px;padding:15px} .login button{padding:15px;font-size:17px;border-radius:13px}
  .bigav{width:110px;height:110px;font-size:42px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login hide">
  <div class="box">
    <svg class="logo" viewBox="0 0 100 100" aria-label="Mersi Clinic">
      <circle cx="50" cy="50" r="50" fill="#8A9A7B"/>
      <text x="50" y="53" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="27" fill="#fff">Mersi</text>
      <text x="50" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" letter-spacing="2.6" fill="#fff">CLINIC</text>
    </svg>
    <h1 class="serif" style="font-weight:400;letter-spacing:.3px">Mersi Workspace</h1><p>เข้าสู่ระบบด้วยบัญชีของทีม</p>
    <input id="lu" placeholder="Username" autocomplete="username">
    <input id="lp" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="err" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="layout hide">
  <div class="side">
    <div class="brand">
      <svg class="logo" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="#8A9A7B"/>
        <text x="50" y="53" text-anchor="middle" font-family="Georgia,serif" font-size="27" fill="#fff">Mersi</text>
        <text x="50" y="70" text-anchor="middle" font-family="Georgia,serif" font-size="9.5" letter-spacing="2.6" fill="#fff">CLINIC</text></svg>
      <span class="bt"><b>Mersi</b><i>WORKSPACE</i></span>
    </div>
    <div class="nav" id="nav"></div>
  </div>
  <div class="main">
    <div class="top">
      <button class="hamb" onclick="toggleSide()">☰</button>
      <h2 id="pageTitle">หน้าหลัก</h2>
      <div class="bell" id="bell" onclick="openNotif()" title="งานใหม่">🔔<span class="bdot hide" id="bdot">0</span></div>
      <div class="avatar" id="topAv" onclick="openProfile()">?</div>
    </div>

<!-- ⚡ Chart.js / html2pdf โหลดตอนต้องใช้เท่านั้น (ไม่บล็อกโหลดหน้าแรก) -->
<script>

function needChart(cb){ if(window.Chart) return cb(); loadJS('https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js').then(cb); }

<script>
var TOKEN=localStorage.getItem('mersi_token')||'', ME=null, DASH=null, TEAM=null, CUR='home', ATTN=null;
var COLS=[['📋 TODO','todo','#a3a99a'],['🔄 DOING','doing','#d9a441'],['👀 REVIEW','review','#c98aa8'],['✅ DONE','done','#6f9e63'],['⛔ BLOCKED','blocked','#cf6a5e']];
var MAPU={todo:'📋 TODO',doing:'🔄 DOING',review:'👀 REVIEW',done:'✅ DONE',blocked:'⛔ BLOCKED'};
function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
// URL ของ Apps Script Web App (ใช้เมื่อเปิดไฟล์แบบ standalone / โฮสต์เอง)
var API_URL='https://script.google.com/macros/s/AKfycbyYS25wLEn_8M2HKdQl-PxoPoAwAb4u8AUKLkXZNiArEG2UVozQZikUc__M9gDNmQeEFw/exec';
function run(fn){
  var a=[].slice.call(arguments,1);
  if(typeof google!=='undefined' && google.script && google.script.run){
    return new Promise(function(res,rej){var r=google.script.run.withSuccessHandler(res).withFailureHandler(rej);r[fn].apply(r,a);});
  }
  return fetch(API_URL,{method:'POST',body:JSON.stringify({fn:fn,args:a})}).then(function(r){return r.json()});
}
function el(id){return document.getElementById(id)}
function toggleSide(){var s=document.querySelector('.side');if(s)s.classList.toggle('open');var o=document.querySelector('.overlay');if(o)o.classList.toggle('show');}
function closeSide(){var s=document.querySelector('.side');if(s)s.classList.remove('open');var o=document.querySelector('.overlay');if(o)o.classList.remove('show');}
function avatarHTML(u,cls){return (u&&u.avatar&&u.avatar.indexOf('data:')===0)?'<img src="'+u.avatar+'">':esc((u&&u.name||'?').slice(0,1))}
/* ---- status pill ---- */
function stMeta(st){st=''+st;
  if(st.indexOf('DONE')>-1)return['done','✅ Done'];
  if(st.indexOf('PROGRESS')>-1||st.indexOf('DOING')>-1)return['doing','🔄 Doing'];
  if(st.indexOf('BLOCK')>-1)return['blocked','🚧 Blocker'];
  if(st.indexOf('REVIEW')>-1)return['review','👀 Review'];
  if(st.indexOf('NEED')>-1)return['need','📌 Need'];
  return['todo',st.replace(/^[^\wก-๙]+/,'')||'TODO'];}
function pill(st){var m=stMeta(st);return '<span class="pill '+m[0]+'">'+esc(m[1])+'</span>';}

/* ---------- AUTH ---------- */
window.onload=function(){ if(TOKEN){ run('ws_me',TOKEN).then(function(r){ if(r.ok){ME=r.user;startApp()} else {showLogin()} }).catch(showLogin);} else showLogin(); };

function doLogin(){el('lerr').textContent='';var u=el('lu').value,p=el('lp').value;
  run('ws_login',u,p).then(function(r){ if(r.ok){TOKEN=r.token;localStorage.setItem('mersi_token',TOKEN);ME=r.user;el('login').classList.add('hide');startApp();} else {el('lerr').textContent=r.err||'ล็อกอินไม่สำเร็จ';} }).catch(function(e){el('lerr').textContent=e.message});}

/* 🔔 System notification — ขอสิทธิ์ครั้งเดียว + poll ทุก 60 วิ + notify แม้ tab ถูก minimize */
function initNotify(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    setTimeout(function(){ Notification.requestPermission(); },3000);      // รอ 3 วิให้ user เห็นหน้าก่อนถาม
  }
  // poll dash ทุก 60 วิ (แม้ user สลับแท็บ)
  setInterval(pollNotify, 60000);
}
function notify(title,body,tag){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  try{ var n=new Notification(title,{body:body,icon:'https://lh3.googleusercontent.com/d/1XZ8=w80',badge:'',tag:tag||'mersi',renotify:true});
    n.onclick=function(){ window.focus(); n.close(); }; }catch(e){}
}
function pollNotify(){
  if(document.hidden===false && CUR==='home') return;                        // อยู่หน้าหลักเห็นอยู่แล้ว ไม่ต้อง notify
  run('ws_dash',TOKEN).then(function(d){ if(!d||!d.ok) return;
    var seen=seenIds();
    var newAsg=(d.assignments||[]).filter(function(a){ return String(a.status).indexOf('DONE')<0 && seen.indexOf(a.id)<0; });
    var oldT=(DASH.hub&&DASH.hub.today)?DASH.hub.today.logs:0;
    var newT=(d.hub&&d.hub.today)?d.hub.today.logs:0;
    DASH=d; saveSnap(d); paintBell();
    if(newAsg.length) notify('📌 งานใหม่ '+newAsg.length+' งาน',(newAsg[0].title||'')+(newAsg.length>1?' และอีก '+(newAsg.length-1)+' งาน':''),'new-asg');
    if(newT>oldT && oldT>0) notify('📊 ทีมลงงานเพิ่ม','วันนี้ทีมลงงาน '+newT+' รายการ','team-log');
  }).catch(function(){});
}
function buildNav(){

/* ---------- DATA ---------- */
/* ⚡ แสดงผลทันทีจากข้อมูลที่เก็บไว้ในเครื่อง แล้วค่อยดึงของใหม่เบื้องหลัง (stale-while-revalidate) */
function saveSnap(d){ try{ localStorage.setItem('mersi_snap',JSON.stringify(d)); }catch(e){} }
function loadSnap(){ try{ var s=localStorage.getItem('mersi_snap'); return s?JSON.parse(s):null; }catch(e){ return null; } }
function loadDash(){

  } else el('content').innerHTML='<div class="loading">กำลังโหลด…</div>';
  run('ws_dash',TOKEN).then(function(d){ if(!d||!d.ok){ if(!snap)showLogin(); return; }
    DASH=d; saveSnap(d); paintBell();

/* ---------- 🔔 NOTIFICATION — งานใหม่ที่มอบให้ฉัน (ยังไม่เคยเปิดดู) ---------- */
function seenIds(){ try{ return JSON.parse(localStorage.getItem('mersi_seen')||'[]'); }catch(e){ return []; } }

/* ---------- HOME = DAILY HUB (ทุกคนลงงานทุกวันที่นี่) ---------- */

      '<label>✅ Done (บรรทัดละงาน)</label><textarea id="dDone" rows="3" placeholder="งานที่ทำเสร็จวันนี้..."></textarea>'+
      '<label>🔄 กำลังทำ (Doing)</label><textarea id="dDoing" rows="2"></textarea>'+
      '<label>🚧 ติดปัญหา (Blocker)</label><textarea id="dBlk" rows="2"></textarea>'+
      '<label>📌 ต้องการความช่วยเหลือ (Need Support)</label><textarea id="dNeed" rows="2"></textarea>'+
      '<button class="btn" onclick="sendDaily()">ส่งเข้า Daily Hub</button> <span id="dMsg" style="color:#27ae8f;font-weight:700"></span></div>'+

      (recent.length?recent.slice(0,20).map(function(r){return '<div class="row"><div class="who">'+esc(r.nick)+'</div><div class="it">'+esc(r.item)+'<br>'+pill(r.status)+' <small>'+esc(r.date)+'</small></div></div>'}).join(''):'<p style="color:#889">ยังไม่มีการลงงานวันนี้</p>')+
      '</div></div></div>';

  html+='<div class="box" style="margin-top:16px"><h3>🗂️ งานที่มอบหมายให้ฉัน <small>— ส่วนเสริม</small></h3>'+(DASH.assignments.length?kanbanRO(DASH.assignments):'<p style="color:#889">ยังไม่มีงานมอบหมาย</p>')+'</div>';

function card(n,l){return '<div class="card"><div class="n">'+esc(n)+'</div><div class="l">'+esc(l)+'</div></div>'}

/* ---------- KANBAN ---------- */
function stKey(st){st=''+st;if(st.indexOf('DOING')>-1||st.indexOf('PROGRESS')>-1)return'doing';if(st.indexOf('REVIEW')>-1)return'review';if(st.indexOf('DONE')>-1)return'done';if(st.indexOf('BLOCK')>-1)return'blocked';return'todo'}
function renderKanban(asg,editable){
  var html='<div class="kan">'+COLS.map(function(c){
    var cs=asg.filter(function(a){return stKey(a.status)===c[1]}).map(function(a){
      return '<div class="kc" draggable="'+(editable?'true':'false')+'" data-id="'+esc(a.id)+'" ondragstart="dStart(event)" onclick="openTask(\''+esc(a.id)+'\')">'+esc(a.title)+
      '<div class="m">'+(a.assignee?'👤 '+esc(a.assignee)+' · ':'')+'⏰ '+esc(a.due||'-')+'</div>'+
      '<div class="m">'+(a.folder?'<a href="'+esc(a.folder)+'" target="_blank">📁 โฟลเดอร์</a> ':'')+
        (a.submitted?'<a href="'+esc(a.submitted)+'" target="_blank" style="color:#27ae8f">✅ งานที่ส่ง</a>':'<span style="color:var(--pri);cursor:pointer" onclick="event.stopPropagation();submitWork(\''+esc(a.id)+'\')">📤 ส่งงาน</span>')+'</div></div>'}).join('');
    return '<div class="col" data-k="'+c[1]+'" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event)"><h4 style="background:'+c[2]+'">'+c[0]+'</h4>'+cs+'</div>'}).join('')+'</div>';
  el('content').innerHTML=html+'<p style="color:#889;font-size:12px">ลากการ์ดข้ามคอลัมน์เพื่อเปลี่ยนสถานะ</p>';
}
function kanbanRO(asg){return '<div class="kan">'+COLS.slice(0,4).map(function(c){
  var cs=asg.filter(function(a){return stKey(a.status)===c[1]}).map(function(a){return '<div class="kc">'+esc(a.title)+'<div class="m">⏰ '+esc(a.due||'-')+'</div></div>'}).join('');
  return '<div class="col"><h4 style="background:'+c[2]+'">'+c[0]+'</h4>'+cs+'</div>'}).join('')+'</div>';}
var DRAG=null;
function dStart(e){DRAG=e.target.getAttribute('data-id');e.dataTransfer.effectAllowed='move'}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag')}
function dLeave(e){e.currentTarget.classList.remove('drag')}
function dDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag');var k=e.currentTarget.getAttribute('data-k');
  var list=ME.isBoss&&CUR==='tasks'?DASH.allAssignments:DASH.assignments; list.forEach(function(a){if(a.id===DRAG)a.status=MAPU[k]});
  renderKanban(list,true);run('ws_setTaskStatus',TOKEN,DRAG,MAPU[k]);}

/* ---------- KANBAN รายวัน (จาก DAILY: เมื่อวาน/วันนี้) ---------- */
var KAN=null, KDRAG=null;
function renderKanbanTab(){ el('content').innerHTML='<div class="loading">กำลังโหลด…</div>';
  run('ws_kanban',TOKEN).then(function(d){ KAN=(d&&d.ok)?d:{today:[],yesterday:[]}; paintKanban(); }); }
function dkCols(){ return [['todo','📋 TODO','#9aa7a3'],['doing','🔄 Doing','#e0a417'],['done','✅ Done','#27ae8f'],['approve','👑 Approve','#8a5cd0'],['blocker','🚧 Blocker','#e2574f'],['need','📌 Need','#3a6bd0']]; }
function dStatusKey(x){ var c=(''+x.status)+' '+(''+x.cat);
  if(c.indexOf('APPROVE')>-1||c.indexOf('Approve')>-1)return'approve';
  if(c.indexOf('DONE')>-1||c.indexOf('Done')>-1)return'done';
  if(c.indexOf('NEED')>-1||c.indexOf('Need')>-1)return'need';
  if(c.indexOf('BLOCK')>-1||c.indexOf('Blocker')>-1)return'blocker';
  if(c.indexOf('TODO')>-1)return'todo';
  return'doing'; }
function dColor(x){ var m={todo:'#9aa7a3',doing:'#e0a417',done:'#27ae8f',approve:'#8a5cd0',blocker:'#e2574f',need:'#3a6bd0'}; return m[dStatusKey(x)]||'#9aa7a3'; }
function paintKanban(){
  var k=KAN||{today:[],yesterday:[]};
  var yCarry=(k.yesterday||[]).filter(function(x){var s=dStatusKey(x);return s==='doing'||s==='todo';});
  var html='<div class="box" style="margin-bottom:14px"><h3>🗓️ เมื่อวาน ('+esc(k.yStr||'-')+') <small>— ลากการ์ดไปวางในคอลัมน์ของวันนี้</small></h3>';
  if((k.yesterday||[]).length){
    html+='<div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">'+k.yesterday.map(function(x){return '<div class="kc" draggable="true" ondragstart="kStart(event,'+x.row+',\'carry\')" onclick="openCard('+x.row+')" style="min-width:190px;flex:0 0 auto;border-left-color:'+dColor(x)+'">'+linkify(x.item)+'<div class="m">'+pill(x.status)+' '+dlChip(x)+'</div></div>'}).join('')+'</div>';

/* 📎 อ่านไฟล์เป็น base64 — surface error จริงถ้ามี (ไม่ทิ้งเงียบ) */
function readFiles(inp,cb){ var fs=[].slice.call((inp&&inp.files)||[]); if(!fs.length) return cb([]);
  if(fs.length>10){ alert('เลือกได้สูงสุด 10 ไฟล์'); return cb(null); }
  var tot=fs.reduce(function(s,f){return s+f.size},0);
  if(tot>25*1024*1024){ alert('ไฟล์รวมกันเกิน 25MB'); return cb(null); }
  var out=[],n=0, errs=[];
  fs.forEach(function(f,idx){
    var finished=false, done=function(r,errMsg){ if(finished) return; finished=true;
      if(r) out.push(r); else errs.push('#'+(idx+1)+' '+(f.name||'?')+': '+(errMsg||'unknown'));
      if(++n===fs.length){ if(errs.length) console.warn('📎 readFiles errors:',errs); cb(out,errs); }
    };
    try{ var rd=new FileReader();
      rd.onload=function(ev){ try{
        var res=''+(ev.target&&ev.target.result||'');
        var i=res.indexOf(','); if(i<0){ done(null,'no base64 comma'); return; }
        var b64=res.substr(i+1); if(!b64){ done(null,'empty data'); return; }
        done({name:f.name||('file'+idx),mime:f.type||'application/octet-stream',data:b64});
      }catch(e){ done(null,'parse: '+e.message); } };
      rd.onerror=function(){ done(null,'FileReader.onerror '+(rd.error&&rd.error.name||'')); };
      rd.onabort=function(){ done(null,'aborted'); };
      setTimeout(function(){ if(!finished){ try{rd.abort();}catch(e){} done(null,'timeout 30s'); } },30000);
      rd.readAsDataURL(f);
    }catch(e){ done(null,'sync throw: '+e.message); }
  });
}

/* ---------- ✅ APPROVE FLOW ---------- */
var APV=[];
function renderApprove(){ el('content').innerHTML='<div class="loading">กำลังโหลด…</div>';
  run('ws_apvList',TOKEN).then(function(r){ APV=(r&&r.ok)?r.items:[]; paintApprove(); }); }
function apvGroup(){
  var me=ME.nick, boss=ME.isBoss;
  var mine=APV.filter(function(x){return x.to===me && x.status==='🎯 DRAFT';});
  var back=APV.filter(function(x){return x.from===me && x.status==='🔁 RETURNED';});
  var pending=boss?APV.filter(function(x){return x.status==='📤 PENDING';}):APV.filter(function(x){return x.approver===me && x.status==='📤 PENDING';});
  var rev=APV.filter(function(x){return x.status==='✏️ REVISION' && (x.to===me||x.from===me||boss);});
  var done=APV.filter(function(x){return x.status==='✅ APPROVED' && (x.from===me||x.to===me||x.approver===me||boss);});
  var need=APV.filter(function(x){return x.status==='📌 NEED';});
  return {mine:mine,back:back,pending:pending,rev:rev,done:done,need:need};
}
function apvCard(x){
  var lk=(x.links||[]).map(function(l){return '<a href="'+esc(l)+'" target="_blank" class="duechip" style="background:#e8eddf;color:#617350;text-decoration:none;margin:2px 4px 2px 0">🔗 ลิงก์</a>';}).join('');
  return '<div class="kc" onclick="apvOpen(\''+esc(x.id)+'\')" style="border-left-color:#8A9A7B">'+esc(x.title)+
    '<div class="m">👤 '+esc(x.from)+' → '+esc(x.to)+(x.approver?' → 👑 '+esc(x.approver):'')+'</div>'+
    (lk?'<div class="m">'+lk+'</div>':'')+
    (x.revNote?'<div class="m" style="color:#cf6a5e">✏️ '+esc(x.revNote)+'</div>':'')+
    '<div class="m">'+esc(x.time)+'</div></div>';
}
function paintApprove(){
  var g=apvGroup(), boss=ME.isBoss;
  var cols=[['📋 งานของฉัน (Draft)',g.mine,'#a3a99a'],['👁️ Pending Review',g.back,'#d9a441'],
    [boss?'👑 Pending Approval (ทั้งหมด)':'👑 รอฉันอนุมัติ',g.pending,'#8a5cd0'],
    ['✏️ Pending Revision',g.rev,'#cf6a5e'],['✅ Approved',g.done,'#6f9e63'],['📌 Need',g.need,'#5b7fa8']];
  var html='<div class="box" style="margin-bottom:12px"><h3>✅ Approve Flow <small style="color:#8b9284;font-weight:400">— ส่งดราฟ → ตรวจ → อนุมัติ · แตะการ์ดเพื่อดำเนินการ</small></h3>'+
    '<button class="btn" onclick="apvNew()">➕ สร้างดราฟใหม่</button></div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px">'+
    cols.map(function(c){ return '<div class="col"><h4 style="background:'+c[2]+'">'+c[0]+' ('+c[1].length+')</h4>'+
      (c[1].length?c[1].map(apvCard).join(''):'<div style="color:#a9b7b2;font-size:11px;text-align:center;padding:8px">—</div>')+'</div>'; }).join('')+'</div>';
  el('content').innerHTML=html;
}
function apvNew(){
  var roster=(DASH.roster||[]).filter(function(n){return n!==ME.nick;});
  var opts=roster.map(function(n){return '<option>'+esc(n)+'</option>'}).join('');
  var bosses=(DASH.teamAll||[]).filter(function(u){return u.isBoss;}).map(function(u){return '<option>'+esc(u.nick)+'</option>'}).join('');
  var h='<h2 style="margin:0 0 12px">➕ สร้างดราฟใหม่</h2>'+
    '<label>ชื่องาน/หัวข้อ</label><input id="anTitle" placeholder="เช่น ตัดคลิป Ads Diode รักแร้">'+
    '<label>ส่งให้ใครทำ</label><select id="anTo">'+opts+'</select>'+
    '<label>ผู้อนุมัติสุดท้าย (ไม่บังคับ · เว้นว่าง = ให้ผู้ทำเลือกภายหลัง)</label><select id="anApv"><option value="">— ให้ผู้ทำเลือก —</option>'+bosses+'</select>'+
    '<label>🔗 ลิงก์อ้างอิง (บรรทัดละลิงก์)</label><textarea id="anLinks" rows="3" placeholder="https://drive.google.com/...&#10;https://figma.com/..."></textarea>'+
    '<label>หมายเหตุ</label><textarea id="anNote" rows="2"></textarea>'+
    '<button class="btn" style="width:100%" onclick="apvSend()">📤 ส่งดราฟ + แจ้งอีเมล</button>'+
    '<button class="btn ghost" style="width:100%;margin-top:8px" onclick="closeTask()">ยกเลิก</button>'+
    '<p id="anMsg" style="text-align:center;font-weight:700;min-height:18px;margin:6px 0 0"></p>';
  el('taskBody').innerHTML=h; el('taskModal').classList.remove('hide');
}
function apvSend(){ var d={title:el('anTitle').value.trim(),to:el('anTo').value,approver:el('anApv').value,
  links:el('anLinks').value.split('\n').map(function(s){return s.trim();}).filter(Boolean),note:el('anNote').value.trim()};
  if(!d.title){el('anMsg').style.color='#cf6a5e';el('anMsg').textContent='ใส่ชื่องาน';return;}
  el('anMsg').style.color='#8b9284';el('anMsg').textContent='กำลังส่ง…';
  run('ws_apvCreate',TOKEN,d).then(function(r){
    if(!r||!r.ok){el('anMsg').style.color='#cf6a5e';el('anMsg').textContent=(r&&r.err)||'ส่งไม่สำเร็จ';return;}
    el('anMsg').style.color='#4d7343';el('anMsg').textContent='✅ ส่งแล้ว '+esc(r.id);
    setTimeout(function(){closeTask();renderApprove();},900);
  });
}
function apvFind(id){ for(var i=0;i<APV.length;i++) if(APV[i].id===id) return APV[i]; return null; }
function apvOpen(id){ var x=apvFind(id); if(!x) return;
  var me=ME.nick, boss=ME.isBoss;
  var acts=[];
  if(x.status==='🎯 DRAFT' && x.to===me) acts.push(['done','✅ ทำเสร็จ — ส่งกลับให้ตรวจ','g']);
  if(x.status==='🔁 RETURNED' && x.from===me){ acts.push(['pending','📤 ส่งต่อให้ MD/Head อนุมัติ','']); acts.push(['revise','✏️ ให้แก้ไข','r']); }
  if(x.status==='📤 PENDING' && (boss || x.approver===me)){ acts.push(['approve','✅ อนุมัติ','g']); acts.push(['revise','✏️ ขอแก้ไข','r']); }
  if(x.status==='✏️ REVISION' && x.to===me) acts.push(['done','✅ แก้เสร็จแล้ว — ส่งกลับ','g']);
  var bosses=(DASH.teamAll||[]).filter(function(u){return u.isBoss;}).map(function(u){return '<option'+(u.nick===x.approver?' selected':'')+'>'+esc(u.nick)+'</option>'}).join('');
  var lk=(x.links||[]).map(function(l){return '<a href="'+esc(l)+'" target="_blank" class="duechip" style="background:#e8eddf;color:#617350;text-decoration:none;margin:2px 4px 2px 0">🔗 ลิงก์</a>';}).join('');
  var h='<h2 style="margin:0 0 4px">'+esc(x.title)+'</h2>'+
    '<div class="subtle" style="margin-bottom:10px">'+esc(x.status)+' · '+esc(x.id)+'</div>'+
    '<div class="li" style="padding:6px 0">👤 <b>'+esc(x.from)+'</b> → <b>'+esc(x.to)+'</b>'+(x.approver?' → 👑 <b>'+esc(x.approver)+'</b>':'')+'</div>'+
    (x.note?'<div class="li" style="padding:6px 0">📝 '+esc(x.note)+'</div>':'')+
    (x.revNote?'<div class="li" style="padding:6px 0;color:#cf6a5e">✏️ '+esc(x.revNote)+'</div>':'')+
    (lk?'<div style="margin:8px 0">'+lk+'</div>':'')+
    '<label>🔗 แนบลิงก์เพิ่ม (บรรทัดละลิงก์)</label><textarea id="apLinks" rows="2"></textarea>';
  var showApv=(x.status==='🔁 RETURNED' && x.from===me);
  if(showApv) h+='<label>👑 ส่งให้ใครอนุมัติ</label><select id="apChoose">'+bosses+'</select>';
  var showRev=acts.some(function(a){return a[0]==='revise';});
  if(showRev) h+='<label>✏️ หมายเหตุแก้ไข (ถ้ากด "ให้แก้")</label><textarea id="apRev" rows="2"></textarea>';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">'+
    acts.map(function(a){return '<button class="btn '+a[2]+'" style="flex:1;min-width:120px" onclick="apvAct(\''+esc(x.id)+'\',\''+a[0]+'\')">'+a[1]+'</button>'}).join('')+
    '</div><button class="btn ghost" style="width:100%;margin-top:8px" onclick="closeTask()">ปิด</button>'+
    '<p id="apMsg" style="text-align:center;font-weight:700;min-height:18px;margin:6px 0 0"></p>';
  el('taskBody').innerHTML=h; el('taskModal').classList.remove('hide');
}
function apvAct(id,action){
  var payload={links:(el('apLinks')?el('apLinks').value:'').split('\n').map(function(s){return s.trim();}).filter(Boolean)};
  if(action==='revise') payload.note=el('apRev')?el('apRev').value:'';
  if(action==='pending' && el('apChoose')) payload.approver=el('apChoose').value;
  el('apMsg').style.color='#8b9284';el('apMsg').textContent='กำลังบันทึก…';
  run('ws_apvAct',TOKEN,id,action,payload).then(function(r){
    if(!r||!r.ok){el('apMsg').style.color='#cf6a5e';el('apMsg').textContent=(r&&r.err)||'ไม่สำเร็จ';return;}
    closeTask(); renderApprove();
  });
}

/* ---------- 📆 CONTENT PLANNER ---------- */
var PL_MONTH='', PL_ITEMS=[], PL_CAN=false;
var PL_PLAT=['Facebook','Instagram','TikTok','YouTube','LINE OA','Website','อื่นๆ'];
var PL_STAT=['📋 Plan','🎨 Design','🎬 Editing','👁️ Review','✅ Posted'];
function ymNow(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); }
function ymShift(x){ var p=PL_MONTH.split('-'), y=+p[0], m=+p[1]+x; while(m<1){m+=12;y--;} while(m>12){m-=12;y++;} PL_MONTH=y+'-'+('0'+m).slice(-2); renderPlanner(); }
function renderPlanner(){
  if(!PL_MONTH) PL_MONTH=ymNow();
  el('content').innerHTML='<div class="box"><div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">'+
    '<button class="btn ghost" onclick="ymShift(-1)">‹ ก่อน</button>'+
    '<div style="flex:1;text-align:center;font-weight:800;font-size:16px">📆 '+esc(PL_MONTH)+'</div>'+
    '<button class="btn ghost" onclick="ymShift(1)">ถัดไป ›</button></div>'+
    '<div id="plWrap"><div class="loading">…</div></div></div>';
  run('ws_planList',TOKEN,PL_MONTH).then(function(r){ PL_ITEMS=(r&&r.ok)?r.items:[]; PL_CAN=(r&&r.canEdit); paintPlanner(); });
}
function paintPlanner(){
  var byDay={}; PL_ITEMS.forEach(function(x){var d=+x.date||0; (byDay[d]=byDay[d]||[]).push(x);});
  var p=PL_MONTH.split('-'), y=+p[0], m=+p[1], days=new Date(y,m,0).getDate(), first=new Date(y,m-1,1).getDay();
  var now=new Date(), cur=(now.getFullYear()===y && now.getMonth()===m-1), td=now.getDate();
  var html='';
  if(PL_CAN) html+='<button class="btn" style="margin-bottom:12px" onclick="plNew()">➕ เพิ่มคอนเทนต์</button> <span class="subtle" style="font-size:12.5px">คลิกช่องวันเพื่อเพิ่ม · คลิกการ์ดเพื่อแก้</span>';
  else html+='<div class="subtle" style="margin-bottom:12px">📄 ดูอย่างเดียว — เฉพาะทีม Content/หัวหน้าแก้ได้</div>';
  html+='<div class="cal" style="grid-template-columns:repeat(7,1fr);gap:6px">';
  ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(function(dn){html+='<div style="text-align:center;font-size:12px;color:#889;font-weight:700;padding:4px">'+dn+'</div>';});
  for(var i=0;i<first;i++) html+='<div></div>';
  var plc={'Facebook':'#4267B2','Instagram':'#E1306C','TikTok':'#000000','YouTube':'#FF0000','LINE OA':'#06C755','Website':'#617350','อื่นๆ':'#8b9284'};
  for(var d=1;d<=days;d++){ var lst=byDay[d]||[];
    var cells=lst.map(function(x){ var col=plc[x.platform]||'#8b9284';
      return '<div class="plcard" '+(PL_CAN?'onclick="event.stopPropagation();plEdit(\''+esc(x.id)+'\')"':'')+' style="border-left:3px solid '+col+';background:#f4f7ef;border-radius:6px;padding:4px 6px;margin-top:3px;font-size:11px;line-height:1.35;cursor:'+(PL_CAN?'pointer':'default')+'"><b>'+esc(x.title)+'</b>'+
      '<div style="color:#8b9284">'+esc(x.platform)+(x.owner?' · 👤 '+esc(x.owner):'')+'</div>'+
      (x.status?'<div style="font-size:10px">'+esc(x.status)+'</div>':'')+'</div>';
    }).join('');
    var addClick=PL_CAN?' onclick="plNewOn('+d+')" style="cursor:pointer"':'';
    html+='<div class="cell'+(cur&&d===td?' today':'')+'"'+addClick+'>'+
      '<div class="d">'+d+'</div>'+cells+'</div>';
  }
  html+='</div>';
  el('plWrap').innerHTML=html;
}
function plNewOn(d){ if(!PL_CAN) return; plForm({month:PL_MONTH,date:d,platform:'Facebook',category:'',title:'',caption:'',owner:ME.nick,status:'📋 Plan',link:''}); }
function plFind(id){ for(var i=0;i<PL_ITEMS.length;i++) if(PL_ITEMS[i].id===id) return PL_ITEMS[i]; return null; }
function plNew(){ plForm({month:PL_MONTH,date:'',platform:'Facebook',category:'',title:'',caption:'',owner:ME.nick,status:'📋 Plan',link:''}); }
function plEdit(id){ var x=plFind(id); if(x) plForm(x); }
function plForm(x){
  var pOpt=PL_PLAT.map(function(p){return '<option'+(p===x.platform?' selected':'')+'>'+esc(p)+'</option>'}).join('');
  var sOpt=PL_STAT.map(function(s){return '<option'+(s===x.status?' selected':'')+'>'+esc(s)+'</option>'}).join('');
  var oOpt='<option value="">—</option>'+(DASH.roster||[]).map(function(n){return '<option'+(n===x.owner?' selected':'')+'>'+esc(n)+'</option>'}).join('');
  var h='<h2 style="margin:0 0 12px">'+(x.id?'✏️ แก้ไข':'➕ เพิ่ม')+' คอนเทนต์</h2>'+
    '<div class="grid2" style="grid-template-columns:1fr 1fr"><div><label>วันที่</label><input type="number" id="pDate" min="1" max="31" value="'+esc(x.date||'')+'"></div>'+
    '<div><label>แพลตฟอร์ม</label><select id="pPlat">'+pOpt+'</select></div></div>'+
    '<label>หมวด/ประเภท</label><input id="pCat" value="'+esc(x.category||'')+'" placeholder="เช่น รีวิว, โปรโมชั่น, Educate">'+
    '<label>หัวข้อ/งาน</label><input id="pTitle" value="'+esc(x.title||'')+'">'+
    '<label>แคปชั่น (ย่อ)</label><textarea id="pCap" rows="3">'+esc(x.caption||'')+'</textarea>'+
    '<div class="grid2" style="grid-template-columns:1fr 1fr"><div><label>เจ้าของ</label><select id="pOwn">'+oOpt+'</select></div>'+
    '<div><label>สถานะ</label><select id="pSt">'+sOpt+'</select></div></div>'+
    '<label>🔗 ลิงก์อ้างอิง</label><input id="pLink" value="'+esc(x.link||'')+'">'+
    '<div style="display:flex;gap:8px;margin-top:6px"><button class="btn" style="flex:1" onclick="plSave(\''+esc(x.id||'')+'\')">💾 บันทึก</button>'+
    (x.id?'<button class="btn r" onclick="plDel(\''+esc(x.id)+'\')">🗑️ ลบ</button>':'')+'</div>'+
    '<button class="btn ghost" style="width:100%;margin-top:8px" onclick="closeTask()">ยกเลิก</button>'+
    '<p id="pMsg" style="text-align:center;font-weight:700;min-height:18px;margin:6px 0 0"></p>';
  el('taskBody').innerHTML=h; el('taskModal').classList.remove('hide');
}
function plSave(id){ var d={id:id,month:PL_MONTH,date:el('pDate').value,platform:el('pPlat').value,category:el('pCat').value.trim(),
  title:el('pTitle').value.trim(),caption:el('pCap').value.trim(),owner:el('pOwn').value,status:el('pSt').value,link:el('pLink').value.trim()};
  if(!d.title||!d.date){el('pMsg').style.color='#cf6a5e';el('pMsg').textContent='ต้องมีวันที่+หัวข้อ';return;}
  el('pMsg').style.color='#8b9284';el('pMsg').textContent='กำลังบันทึก…';
  run('ws_planSave',TOKEN,d).then(function(r){
    if(!r||!r.ok){el('pMsg').style.color='#cf6a5e';el('pMsg').textContent=(r&&r.err)||'บันทึกไม่สำเร็จ';return;}
    closeTask(); renderPlanner();
  });
}
function plDel(id){ if(!confirm('ลบคอนเทนต์นี้?')) return;
  run('ws_planDelete',TOKEN,id).then(function(r){ if(r&&r.ok){closeTask();renderPlanner();} else alert('ลบไม่สำเร็จ'); }); }

function savePw(){el('pfMsg').style.color='#e2574f';run('ws_changePassword',TOKEN,el('pfOld').value,el('pfNew').value).then(function(r){if(r.ok){el('pfMsg').style.color='#27ae8f';el('pfMsg').textContent='✅ เปลี่ยนรหัสแล้ว';el('pfOld').value='';el('pfNew').value='';}else{el('pfMsg').textContent=r.err;}})}
function pickAvatar(){var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=function(){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(ev){var img=new Image();img.onload=function(){var c=document.createElement('canvas');c.width=c.height=128;var x=c.getContext('2d');var s=Math.min(img.width,img.height);x.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,128,128);var data=c.toDataURL('image/jpeg',0.7);el('pfMsg').style.color='#27ae8f';el('pfMsg').textContent='กำลังอัปโหลด…';run('ws_updateProfile',TOKEN,{avatar:data}).then(function(r){if(r.ok){ME=r.user;el('bigav').innerHTML=avatarHTML(ME);el('topAv').innerHTML=avatarHTML(ME);el('pfMsg').textContent='✅ เปลี่ยนรูปแล้ว';}});};img.src=ev.target.result;};rd.readAsDataURL(f);};inp.click();}
</script>
